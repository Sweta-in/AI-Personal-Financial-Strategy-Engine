version: "3.9"

services:
  # ── Data Layer ──
  postgres:
    image: postgres:15-alpine
    container_name: finengine-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finengine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finengine_dev}
      POSTGRES_DB: ${POSTGRES_DB:-finengine}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finengine"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finengine-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: finengine-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-finengine}:${POSTGRES_PASSWORD:-finengine_dev}@postgres:5432/${POSTGRES_DB:-finengine}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-in-production}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── MCP Servers ──
  loan-mcp:
    build:
      context: .
      dockerfile: docker/mcp_servers.Dockerfile
    container_name: finengine-loan-mcp
    restart: unless-stopped
    command: ["python", "-m", "mcp_servers.loan_mcp.server"]
    ports:
      - "8001:8001"
    environment:
      MCP_PORT: "8001"

  portfolio-mcp:
    build:
      context: .
      dockerfile: docker/mcp_servers.Dockerfile
    container_name: finengine-portfolio-mcp
    restart: unless-stopped
    command: ["python", "-m", "mcp_servers.portfolio_mcp.server"]
    ports:
      - "8002:8002"
    environment:
      MCP_PORT: "8002"
      REDIS_URL: redis://redis:6379/1

  insurance-mcp:
    build:
      context: .
      dockerfile: docker/mcp_servers.Dockerfile
    container_name: finengine-insurance-mcp
    restart: unless-stopped
    command: ["python", "-m", "mcp_servers.insurance_mcp.server"]
    ports:
      - "8003:8003"
    environment:
      MCP_PORT: "8003"

  market-mcp:
    build:
      context: .
      dockerfile: docker/mcp_servers.Dockerfile
    container_name: finengine-market-mcp
    restart: unless-stopped
    command: ["python", "-m", "mcp_servers.market_mcp.server"]
    ports:
      - "8004:8004"
    environment:
      MCP_PORT: "8004"
      REDIS_URL: redis://redis:6379/2

  risk-mcp:
    build:
      context: .
      dockerfile: docker/mcp_servers.Dockerfile
    container_name: finengine-risk-mcp
    restart: unless-stopped
    command: ["python", "-m", "mcp_servers.risk_mcp.server"]
    ports:
      - "8005:8005"
    environment:
      MCP_PORT: "8005"
      MODEL_PATH: /app/ml/models/stress_model.pkl

  knowledge-mcp:
    build:
      context: .
      dockerfile: docker/mcp_servers.Dockerfile
    container_name: finengine-knowledge-mcp
    restart: unless-stopped
    command: ["python", "-m", "mcp_servers.knowledge_mcp.server"]
    ports:
      - "8006:8006"
    environment:
      MCP_PORT: "8006"

  # ── Frontend ──
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: finengine-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend

  # ── Observability ──
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: finengine-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"

  grafana:
    image: grafana/grafana:10.2.0
    container_name: finengine-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-finengine}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/finengine.json:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
