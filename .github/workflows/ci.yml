name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check . --output-format=github

      - name: Run ruff formatter check
        run: ruff format --check .

  test-quant:
    name: Test Quant Engine
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r quant/requirements.txt
          pip install pytest pytest-cov

      - name: Run quant tests
        run: pytest quant/tests/ -v --tb=short --cov=quant --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: quant-coverage
          path: coverage.xml

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_finance
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r quant/requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_finance
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key-for-ci
          JWT_ALGORITHM: HS256
          APP_ENV: testing
        run: pytest backend/tests/ -v --tb=short --cov=backend --cov-report=xml

  test-mcp:
    name: Test MCP Servers
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r mcp_servers/requirements.txt
          pip install -r quant/requirements.txt
          pip install pytest pytest-cov

      - name: Run MCP tests
        env:
          REDIS_URL: redis://localhost:6379/0
        run: pytest mcp_servers/tests/ -v --tb=short --cov=mcp_servers --cov-report=xml

  test-ml:
    name: Test ML Pipeline
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r ml/requirements.txt
          pip install pytest pytest-cov

      - name: Run ML tests
        run: pytest ml/tests/ -v --tb=short --cov=ml --cov-report=xml

  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: [test-backend, test-quant]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/backend.Dockerfile -t finance-backend:${{ github.sha }} .

  build-mcp:
    name: Build MCP Image
    runs-on: ubuntu-latest
    needs: [test-mcp, test-quant]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/mcp_servers.Dockerfile -t finance-mcp:${{ github.sha }} .

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
