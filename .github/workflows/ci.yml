name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_BACKEND_REPO: finengine-backend
  ECR_FRONTEND_REPO: finengine-frontend
  ECR_MCP_REPO: finengine-mcp

permissions:
  contents: read
  id-token: write

jobs:
  # ── Lint & Type Check ──
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check backend/ quant/ agents/ mcp_servers/ rag/ ml/

      - name: Ruff format check
        run: ruff format --check backend/ quant/ agents/ mcp_servers/ rag/ ml/

  # ── Backend Tests ──
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: finengine
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: finengine_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r quant/requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run quant tests
        run: pytest quant/tests/ -v --tb=short

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://finengine:testpassword@localhost:5432/finengine_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key-for-ci-only
          GROQ_API_KEY: test-key
        run: pytest backend/tests/ -v --tb=short --cov=backend/app --cov-report=xml

      - name: Run MCP server tests
        run: pytest mcp_servers/tests/ -v --tb=short

      - name: Run agent tests
        run: pytest agents/tests/ -v --tb=short

      - name: Run RAG tests
        run: pytest rag/tests/ -v --tb=short

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── ML Tests ──
  test-ml:
    name: ML Model Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r ml/requirements.txt
          pip install pytest

      - name: Run ML tests
        run: pytest ml/tests/ -v --tb=short

  # ── Frontend Tests ──
  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

  # ── Docker Build ──
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-ml, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          push: false
          tags: ${{ env.ECR_BACKEND_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: false
          tags: ${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to AWS ──
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_BACKEND_REPO }}:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_FRONTEND_REPO }}:latest

      - name: Smoke test
        run: |
          sleep 30
          HEALTH_URL="http://${{ secrets.ALB_DNS_NAME }}/health"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" $HEALTH_URL || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed with status: $STATUS"
            echo "Rolling back..."
            exit 1
          fi
          echo "✅ Deployment healthy"
